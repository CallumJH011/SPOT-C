<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOT-C</title>
    <style>
        :root {
            --yt-red: #FF0000;
            --bg-color: #F4F7F9;
            --panel-bg: #FFFFFF;
            --border-color: #DDE1E7;
            --primary-blue: #009DDC;
            /* Updated Category Colors based on design */
            --therapeutic: #509eed;
            --management: #60a95c;
            --null-color: #e88d43;
            --tagging-red: #E74C3C;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }

        /* App Header / Logo */
        .app-header { display: flex; align-items: center; gap: 10px; }
        .logo-badge { background: var(--primary-blue); color: white; padding: 5px 12px; border-radius: 6px; font-weight: 900; letter-spacing: 1px; font-size: 16px; }
        .app-title { font-size: 16px; font-weight: bold; color: #2C3E50; }

        /* Video Player Container */
        .video-wrapper { position: relative; background: #000; border-radius: 12px; overflow: hidden; flex-grow: 1; display: flex; flex-direction: column; }
        video { width: 100%; height: 100%; cursor: pointer; }

        /* YouTube Style Controls */
        .yt-title-bar { position: absolute; top: 0; left: 0; right: 0; background: linear-gradient(rgba(0,0,0,0.8), transparent); padding: 15px; color: white; font-weight: 600; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 10; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .yt-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 10px; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.3s; z-index: 10; }
        .video-wrapper:hover .yt-controls, .video-wrapper:hover .yt-title-bar { opacity: 1; }
        .yt-progress-container { width: 100%; height: 5px; background: rgba(255,255,255,0.3); cursor: pointer; margin-bottom: 10px; position: relative; }
        .yt-progress-bar { height: 100%; background: var(--yt-red); width: 0%; }
        .yt-bottom-row { display: flex; align-items: center; gap: 15px; color: white; font-size: 13px; }

        /* Layout */
        .top-row { display: flex; gap: 20px; flex: 7; min-height: 0; }
        .player-side { flex: 2; display: flex; flex-direction: column; gap: 10px; }
        .sidebar { flex: 1.2; background: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

        /* Buttons & Inputs */
        button { border-radius: 8px; padding: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 12px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .primary-btn { background-color: var(--primary-blue); color: white; }
        .primary-btn:disabled { background-color: #BDC3C7; cursor: not-allowed; }
        .secondary-btn { background: white; border: 1px solid #D1D1D1; color: #555; }
        .delete-btn { background: #FDEDEC; border: 1px solid #FADBD8; color: #E74C3C; }
        
        .tag-btn { border: 2px solid transparent; flex: 1; color: white; opacity: 0.6; }
        .tag-btn.active { opacity: 1; border-color: #2C3E50; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        #btn-therapeutic, .btn-Therapeutic { background: var(--therapeutic); }
        #btn-management, .btn-Management { background: var(--management); }
        #btn-null, .btn-Null { background: var(--null-color); }

        #mark-btn.tagging { background-color: var(--tagging-red) !important; color: white; font-weight: bold; opacity: 1; border: none;}

        /* Clinical Striped Bar */
        #striped-timeline { width: 100%; height: 35px; background: #E5E9EC; position: relative; border-radius: 4px; overflow: hidden; }
        .tag-stripe { position: absolute; height: 23px; top: 6px; border-radius: 2px;}

        /* Bottom Row Adjustments */
        .bottom-row { display: flex; gap: 20px; flex: 3; min-height: 0; }
        .panel { background: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; overflow: hidden;}
        #log-panel { flex: 2; }
        #dash-panel { flex: 1; }

        select { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; padding: 2px; }
        .log-item { font-size: 12px; padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s;}
        .log-item:hover { background: #f9f9f9; }

        /* Modal Overlay */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 700px; max-height: 85vh; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-footer { display: flex; justify-content: space-between; flex-shrink: 0; }
        .dash-layout { display: flex; gap: 15px; align-items: center; margin-top: 10px; flex-grow: 1; }

        /* ----- NEW PROMPT CARDS UI ----- */
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .prompt-card { border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; background: white;}
        .prompt-card-header { padding: 12px; color: white; font-weight: bold; font-size: 14px; }
        .prompt-card-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .prompt-section-title { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 2px; }
        
        .scale-group { display: flex; gap: 5px; }
        .scale-btn { flex: 1; padding: 8px 0; background: #2f4eb0; color: white; border: none; border-radius: 4px; cursor: pointer; text-align: center; font-weight: bold; opacity: 0.9;}
        .scale-btn.active { opacity: 1; box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px #2C3E50; }

        .sub-btn { width: 100%; padding: 8px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .outline-btn { color: #555; border-color: #B0BEC5; }
        .outline-btn.active { border-color: #2C3E50; background: #ECEFF1; font-weight: bold; color: #2C3E50; }

        /* Inner category headers */
        .inner-header { padding: 8px; text-align: center; color: white; font-weight: bold; border-radius: 4px; font-size: 12px; }
        .ih-tx { background: #618df2; }
        .ih-talk { background: #7bc2f7; }
        .ih-beh { background: #61b05d; }
        .ih-fac { background: #3f6e3a; }
        .ih-tech { background: #94c965; }
        .ih-non { background: #f2d18d; color: white; text-shadow: 0px 1px 2px rgba(0,0,0,0.2);}
        .ih-noint { background: #f0b85a; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        .prompt-input { border: 1px solid #B0BEC5; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box; font-size: 11px;}
    </style>
</head>
<body>

    <div class="app-header">
        <div class="logo-badge">SPOT-C</div>
        <div class="app-title"></div>
    </div>

    <div class="top-row">
        <div class="player-side">
            <div class="video-wrapper" id="player-container">
                <div class="yt-title-bar" id="video-title-display">No Video Loaded</div>
                <video id="main-video" onclick="togglePlay()"></video>
                <div class="yt-controls">
                    <div class="yt-progress-container" onclick="seekVideo(event)"><div class="yt-progress-bar" id="yt-bar"></div></div>
                    <div class="yt-bottom-row">
                        <span id="play-pause-icon" onclick="togglePlay()" style="cursor:pointer; font-size:18px;">▶</span>
                        <span id="time-display">00:00.0 / 00:00.0</span>
                        <div style="margin-left: auto; display: flex; gap: 10px; align-items: center;">
                            Speed: 
                            <select onchange="setSpeed(this.value)">
                                <option value="0.5">0.5x</option><option value="1.0" selected>1.0x</option>
                                <option value="1.5">1.5x</option><option value="2.0">2.0x</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div id="striped-timeline"></div>
        </div>

        <div class="sidebar">
            <div style="display: flex; gap: 5px;">
                <input type="file" id="video-upload" accept="video/*" style="display:none" onchange="loadVideo(this)">
                <button class="primary-btn" onclick="document.getElementById('video-upload').click()">Load Recording</button>
                <input type="file" id="csv-upload" accept=".csv" style="display:none" onchange="loadCSV(this)">
                <button id="load-save-btn" class="primary-btn" disabled onclick="document.getElementById('csv-upload').click()">Load from Save</button>
            </div>

            <label><b>TAG CATEGORIES</b></label>
            <div style="display: flex; gap: 8px;">
                <button id="btn-therapeutic" class="tag-btn" onclick="toggleCat('Therapeutic')">Therapeutic</button>
                <button id="btn-management" class="tag-btn" onclick="toggleCat('Management')">Management</button>
                <button id="btn-null" class="tag-btn" onclick="toggleCat('Null')">Null</button>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="mark-btn" class="secondary-btn" style="flex: 2;" onclick="handleMark()">Start Tagging</button>
                <button class="secondary-btn" style="flex: 1;" onclick="jumpToLastTag()" title="Jump to the end of the latest tag">Jump to Last</button>
            </div>

            <label><b>CLINICAL PROMPTS</b></label>
            <div id="prompt-area" style="flex-grow: 1; overflow-y: auto; background: #FAFAFA; border-radius: 8px; padding: 10px;">
                <div style="color: #999; font-size: 12px; font-style: italic;">Select a category to view prompts.</div>
            </div>

            <button class="primary-btn" style="flex-shrink: 0;" onclick="saveEntry()">Save Full Entry</button>
        </div>
    </div>

    <div class="bottom-row">
        <div class="panel" id="log-panel">
            <div><b>SESSION LOG</b> <span style="font-size: 11px; color: #777;">(Double-click to edit)</span></div>
            <div id="log-list" style="margin-top: 10px; flex-grow: 1; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px;"></div>
        </div>
        <div class="panel" id="dash-panel">
            <div><b>DASHBOARD</b></div>
            <div class="dash-layout">
                <div id="stats-content" style="font-size: 13px; line-height: 1.8; flex: 1;"></div>
                <canvas id="pie-chart" width="110" height="110" style="flex-shrink: 0;"></canvas>
            </div>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: auto; flex-shrink: 0;">
        <button class="secondary-btn" onclick="exportCSV()">Save Session</button>
        <button class="secondary-btn" onclick="alert('SPOT-C | Clinical Annotation Tool')">Info</button>
        <button class="secondary-btn" onclick="location.reload()">Exit Tool</button>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; color: #2C3E50; flex-shrink: 0;">Edit Clinical Observation</h3>
            
            <div style="display: flex; gap: 10px; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); flex-shrink: 0;">
                <label style="font-size: 12px; font-weight: bold;">Start:</label>
                <input type="text" id="edit-start" class="prompt-input" style="width: 80px; margin: 0; padding: 6px;">
                <label style="font-size: 12px; font-weight: bold;">End:</label>
                <input type="text" id="edit-end" class="prompt-input" style="width: 80px; margin: 0; padding: 6px;">
                <button class="secondary-btn" onclick="seekFromEdit()" style="padding: 6px 12px;">Seek</button>
            </div>

            <label style="font-size: 12px; font-weight: bold; flex-shrink: 0;">Categories:</label>
            <div style="display: flex; gap: 8px; flex-shrink: 0;" id="edit-cat-buttons"></div>

            <label style="font-size: 12px; font-weight: bold; flex-shrink: 0;">Prompts:</label>
            <div id="edit-prompt-area" style="background: #FAFAFA; border-radius: 8px; padding: 10px; border: 1px solid var(--border-color); flex-grow: 1; overflow-y: auto; min-height: 120px;"></div>

            <div class="modal-footer">
                <button class="delete-btn" onclick="deleteTag()">Delete Tag</button>
                <div style="display: flex; gap: 10px;">
                    <button class="secondary-btn" onclick="closeModal()">Cancel</button>
                    <button class="primary-btn" onclick="saveEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let video = document.getElementById('main-video');
        let startTime = null;
        let selectedCats = [];
        let allTags = [];
        let editingIndex = null;
        let editSelectedCats = [];
        let currentVideoName = "session";

        // Updated Schema
        const COLORS = { "Therapeutic": "#509eed", "Management": "#60a95c", "Null": "#e88d43" };
        const CAT_ORDER = ["Therapeutic", "Management", "Null"];

        // Time Helpers
        function formatTime(seconds) {
            if (seconds === null || isNaN(seconds)) return "00:00.0";
            let s = Math.floor(seconds % 60);
            let m = Math.floor(seconds / 60);
            let d = Math.floor((seconds % 1) * 10);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${d}`;
        }

        function parseTime(timeStr) {
            try {
                let parts = timeStr.split(':');
                return (parseInt(parts[0]) * 60) + parseFloat(parts[1]); 
            } catch (e) { return 0; }
        }

        // System Functions
        function loadVideo(input) {
            if (input.files && input.files[0]) {
                let file = input.files[0];
                video.src = URL.createObjectURL(file);
                document.getElementById('video-title-display').innerText = file.name;
                document.getElementById('load-save-btn').disabled = false;
                currentVideoName = file.name.replace(/\.[^/.]+$/, "");
                drawPieChart();
            }
        }

        function loadCSV(input) { /* Logic remains exactly same, safely loads old JSON format */
            if (!input.files || !input.files[0]) return;
            let file = input.files[0];
            let reader = new FileReader();
            reader.onload = function(e) {
                let lines = e.target.result.split('\n');
                allTags = []; 
                for (let i = 1; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (!line) continue;
                    let quoteSplitIdx = line.indexOf(',"'); 
                    if (quoteSplitIdx !== -1) {
                        let parts = line.substring(0, quoteSplitIdx).split(',');
                        let start = parseInt(parts[0]) / 1000; 
                        let end = parseInt(parts[1]) / 1000;
                        let cats = parts[2] ? parts[2].split('|') : [];
                        let unescapedJson = line.substring(quoteSplitIdx + 2, line.length - 1).replace(/""/g, '"');
                        let prompts = {};
                        try { prompts = JSON.parse(unescapedJson); } catch(err) {}
                        allTags.push({ start, end, cats, prompts });
                    }
                }
                allTags.sort((a, b) => a.start - b.start);
                updateUI();
                input.value = ""; 
            };
            reader.readAsText(file);
        }

        function togglePlay() {
            video.paused ? video.play() : video.pause();
            document.getElementById('play-pause-icon').innerText = video.paused ? "▶" : "⏸";
        }
        function seekVideo(e) { video.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.getBoundingClientRect().width) * video.duration; }
        video.ontimeupdate = () => {
            document.getElementById('yt-bar').style.width = ((video.currentTime / video.duration) * 100) + "%";
            document.getElementById('time-display').innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration || 0)}`;
        };
        function setSpeed(val) { video.playbackRate = parseFloat(val); }

        // ----- Custom Card Logic Generator -----
        function togglePromptBtn(btn, groupClass, isMulti) {
            if (!isMulti) {
                btn.closest('.prompt-card-body').querySelectorAll('.' + groupClass).forEach(b => b.classList.remove('active'));
            }
            btn.classList.toggle('active');
        }

        function extractPrompts(containerId) {
            let prompts = {};
            let container = document.getElementById(containerId);
            container.querySelectorAll('.prompt-input').forEach(inp => { if(inp.value.trim() !== "") prompts[inp.dataset.key] = inp.value; });
            container.querySelectorAll('button.active[data-key]').forEach(btn => { prompts[btn.dataset.key] = btn.dataset.val; });
            return prompts;
        }

        function generateCardHTML(cat, vals = {}) {
            const getActive = (key, val) => (vals[key] === val) ? 'active' : '';
            const getVal = (key) => vals[key] || '';

            if (cat === 'Therapeutic') {
                return `
                <div class="prompt-card">
                    <div class="prompt-card-header bg-therapeutic">Therapeutic</div>
                    <div class="prompt-card-body">
                        <div class="inner-header ih-tx">Tx activity</div>
                        <div class="prompt-section-title">Parent Involvement:</div>
                        <div class="scale-group">
                            ${[1,2,3,4,5].map(n => `<button class="scale-btn scale-parent ${getActive('ParentInv', String(n))}" onclick="togglePromptBtn(this, 'scale-parent', false)" data-key="ParentInv" data-val="${n}">${n}</button>`).join('')}
                        </div>
                        <div class="prompt-section-title" style="margin-top: 10px;">Clinician Involvement:</div>
                        <div class="scale-group">
                            ${[1,2,3,4,5].map(n => `<button class="scale-btn scale-clinician ${getActive('ClinicianInv', String(n))}" onclick="togglePromptBtn(this, 'scale-clinician', false)" data-key="ClinicianInv" data-val="${n}">${n}</button>`).join('')}
                        </div>
                        <div class="inner-header ih-talk" style="margin-top: 15px;">Talk</div>
                        <button class="sub-btn tx-talk ${getActive('TxTalk', 'Clinician-Led')}" onclick="togglePromptBtn(this, 'tx-talk', false)" data-key="TxTalk" data-val="Clinician-Led" style="background: #3b5bdb; color: white;">Clinician-Led</button>
                        <button class="sub-btn tx-talk ${getActive('TxTalk', 'Client-led')}" onclick="togglePromptBtn(this, 'tx-talk', false)" data-key="TxTalk" data-val="Client-led" style="background: #3b5bdb; color: white;">Client-led</button>
                        <button class="sub-btn tx-talk ${getActive('TxTalk', 'Joint talk')}" onclick="togglePromptBtn(this, 'tx-talk', false)" data-key="TxTalk" data-val="Joint talk" style="background: #3b5bdb; color: white;">Joint talk</button>
                    </div>
                </div>`;
            } else if (cat === 'Management') {
                return `
                <div class="prompt-card">
                    <div class="prompt-card-header bg-management">Management</div>
                    <div class="prompt-card-body">
                        <div class="inner-header ih-beh">Behaviour</div>
                        <div class="prompt-section-title">Sources of behaviour:</div>
                        <div class="grid-2">
                            <button class="sub-btn outline-btn beh-source ${getActive('BehSource', 'External')}" onclick="togglePromptBtn(this, 'beh-source', false)" data-key="BehSource" data-val="External">External</button>
                            <button class="sub-btn outline-btn beh-source ${getActive('BehSource', 'Internal')}" onclick="togglePromptBtn(this, 'beh-source', false)" data-key="BehSource" data-val="Internal">Internal</button>
                        </div>
                        <div class="prompt-section-title" style="margin-top: 10px;">Managing behaviour:</div>
                        <div class="grid-3">
                            <button class="sub-btn outline-btn beh-manage ${getActive('BehManage', 'Parent')}" onclick="togglePromptBtn(this, 'beh-manage', false)" data-key="BehManage" data-val="Parent">Parent</button>
                            <button class="sub-btn outline-btn beh-manage ${getActive('BehManage', 'Clinician')}" onclick="togglePromptBtn(this, 'beh-manage', false)" data-key="BehManage" data-val="Clinician">Clinician</button>
                            <button class="sub-btn outline-btn beh-manage ${getActive('BehManage', 'Both')}" onclick="togglePromptBtn(this, 'beh-manage', false)" data-key="BehManage" data-val="Both">Both</button>
                        </div>
                        <div class="inner-header ih-fac" style="margin-top: 15px;">Facilitating Engagement</div>
                        <div class="grid-3">
                            <button class="sub-btn outline-btn fac-eng ${getActive('Facilitating', 'Structuring session')}" onclick="togglePromptBtn(this, 'fac-eng', false)" data-key="Facilitating" data-val="Structuring session">Structuring session</button>
                            <button class="sub-btn outline-btn fac-eng ${getActive('Facilitating', 'Engagement Activity')}" onclick="togglePromptBtn(this, 'fac-eng', false)" data-key="Facilitating" data-val="Engagement Activity">Engagement Activity</button>
                            <button class="sub-btn outline-btn fac-eng ${getActive('Facilitating', 'Responding to Client Needs')}" onclick="togglePromptBtn(this, 'fac-eng', false)" data-key="Facilitating" data-val="Responding to Client Needs">Responding to Client</button>
                        </div>
                        <div class="inner-header ih-tech" style="margin-top: 15px;">Technology Factors</div>
                        <div class="grid-2">
                            <button class="sub-btn outline-btn tech-fac ${getActive('TechFactor', 'Platform')}" onclick="togglePromptBtn(this, 'tech-fac', false)" data-key="TechFactor" data-val="Platform">Platform (Zoom)</button>
                            <button class="sub-btn outline-btn tech-fac ${getActive('TechFactor', 'Online resources')}" onclick="togglePromptBtn(this, 'tech-fac', false)" data-key="TechFactor" data-val="Online resources">Online resources</button>
                            <button class="sub-btn outline-btn tech-fac ${getActive('TechFactor', 'Connectivity Issues')}" onclick="togglePromptBtn(this, 'tech-fac', false)" data-key="TechFactor" data-val="Connectivity Issues">Connectivity Issues</button>
                            <input type="text" class="sub-btn outline-btn prompt-input" style="cursor: text;" data-key="TechOther" placeholder="Other..." value="${getVal('TechOther')}">
                        </div>
                    </div>
                </div>`;
            } else if (cat === 'Null') {
                return `
                <div class="prompt-card">
                    <div class="prompt-card-header bg-null">Null</div>
                    <div class="prompt-card-body">
                        <div class="inner-header ih-non">Non-Therapeutic talk</div>
                        <div class="prompt-section-title">Nature of talk:</div>
                        <div class="grid-2">
                            <button class="sub-btn outline-btn null-nature ${getActive('NatureOfTalk', 'Logistics')}" onclick="togglePromptBtn(this, 'null-nature', false)" data-key="NatureOfTalk" data-val="Logistics">Logistics</button>
                            <button class="sub-btn outline-btn null-nature ${getActive('NatureOfTalk', 'Casual Convo')}" onclick="togglePromptBtn(this, 'null-nature', false)" data-key="NatureOfTalk" data-val="Casual Convo">Casual Convo</button>
                        </div>
                        <input type="text" class="sub-btn outline-btn prompt-input" style="cursor: text; width: 100%; box-sizing: border-box; margin-top: 5px;" data-key="NatureOther" placeholder="Other..." value="${getVal('NatureOther')}">
                        
                        <div class="inner-header ih-noint" style="margin-top: 15px;">No interaction/ Unplanned</div>
                        <div class="prompt-section-title">Due to:</div>
                        <div class="grid-2">
                            <button class="sub-btn outline-btn null-due ${getActive('DueTo', 'Client/Caregiver Factors')}" onclick="togglePromptBtn(this, 'null-due', false)" data-key="DueTo" data-val="Client/Caregiver Factors">Client/Caregiver Factors</button>
                            <button class="sub-btn outline-btn null-due ${getActive('DueTo', 'Clinician Factors')}" onclick="togglePromptBtn(this, 'null-due', false)" data-key="DueTo" data-val="Clinician Factors">Clinician Factors</button>
                        </div>
                        <input type="text" class="sub-btn outline-btn prompt-input" style="cursor: text; width: 100%; box-sizing: border-box; margin-top: 5px;" data-key="DueOther" placeholder="Other..." value="${getVal('DueOther')}">
                    </div>
                </div>`;
            }
            return '';
        }

        // Tag Handling
        function toggleCat(cat) {
            const btn = document.getElementById(`btn-${cat.toLowerCase()}`);
            if (selectedCats.includes(cat)) {
                selectedCats = selectedCats.filter(c => c !== cat);
                btn.classList.remove('active');
            } else {
                selectedCats.push(cat);
                btn.classList.add('active');
            }
            renderPrompts();
        }

        function renderPrompts() {
            const area = document.getElementById('prompt-area');
            if (selectedCats.length === 0) {
                area.innerHTML = '<div style="color: #999; font-size: 12px; font-style: italic;">Select a category to view prompts.</div>';
                return;
            }
            let orderedCats = CAT_ORDER.filter(c => selectedCats.includes(c));
            area.innerHTML = `<div class="cards-container">${orderedCats.map(cat => generateCardHTML(cat)).join('')}</div>`;
        }

        function handleMark() {
            startTime = video.currentTime;
            let btn = document.getElementById('mark-btn');
            btn.innerText = `Tagging... (${formatTime(startTime)})`;
            btn.classList.add('tagging');
        }
        
        function jumpToLastTag() {
            if (allTags.length === 0) { alert("No tags recorded yet."); return; }
            video.currentTime = Math.max(...allTags.map(t => t.end));
            video.pause(); document.getElementById('play-pause-icon').innerText = "▶";
        }

        function saveEntry() {
            if (startTime === null || selectedCats.length === 0) return;
            allTags.push({ start: startTime, end: video.currentTime, cats: [...selectedCats], prompts: extractPrompts('prompt-area') });
            allTags.sort((a, b) => a.start - b.start);
            
            startTime = null; selectedCats = [];
            document.querySelectorAll('.sidebar .tag-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mark-btn').innerText = "Start Tagging";
            document.getElementById('mark-btn').classList.remove('tagging');
            renderPrompts(); updateUI();
        }

        // UI Updates
        function getStripeBackground(cats) {
            if (cats.length === 1) return COLORS[cats[0]];
            let stops = [];
            cats.forEach((cat, index) => {
                stops.push(`${COLORS[cat]} ${index * 10}px`);
                stops.push(`${COLORS[cat]} ${(index + 1) * 10}px`);
            });
            return `repeating-linear-gradient(-45deg, ${stops.join(', ')})`;
        }

        function drawPieChart() {
            const canvas = document.getElementById('pie-chart');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let pieData = { "Therapeutic": 0, "Management": 0, "Null": 0 };
            let pieTotal = 0;
            
            allTags.forEach(t => {
                let splitDur = (t.end - t.start) / Math.max(t.cats.length, 1);
                t.cats.forEach(c => { if(pieData[c] !== undefined) { pieData[c] += splitDur; pieTotal += splitDur; }});
            });

            let radius = Math.min(canvas.width, canvas.height) / 2;
            if (pieTotal > 0) {
                let startAngle = -Math.PI / 2;
                Object.keys(COLORS).forEach(cat => {
                    if (pieData[cat] > 0) {
                        let sliceAngle = (pieData[cat] / pieTotal) * 2 * Math.PI;
                        ctx.beginPath(); ctx.moveTo(radius, radius);
                        ctx.arc(radius, radius, radius, startAngle, startAngle + sliceAngle);
                        ctx.fillStyle = COLORS[cat]; ctx.fill();
                        startAngle += sliceAngle;
                    }
                });
            } else {
                ctx.beginPath(); ctx.arc(radius, radius, radius, 0, 2 * Math.PI);
                ctx.fillStyle = "#E5E9EC"; ctx.fill();
            }
        }

        function updateUI() {
            document.getElementById('log-list').innerHTML = allTags.map((t, index) => `
                <div class="log-item" ondblclick="openEditModal(${index})">
                    <b style="color: #2C3E50;">${t.cats.join(', ')}</b><br>
                    <span style="color: #777;">${formatTime(t.start)} - ${formatTime(t.end)}</span>
                </div>`).join('');
            
            const timeline = document.getElementById('striped-timeline');
            timeline.innerHTML = '';
            allTags.forEach(t => {
                let div = document.createElement('div');
                div.className = 'tag-stripe';
                div.style.left = ((t.start / (video.duration || 1)) * 100) + '%'; 
                div.style.width = (((t.end - t.start) / (video.duration || 1)) * 100) + '%';
                div.style.background = getStripeBackground(t.cats);
                timeline.appendChild(div);
            });

            let totalTime = allTags.reduce((sum, t) => sum + (t.end - t.start), 0);
            document.getElementById('stats-content').innerHTML = Object.keys(COLORS).map(cat => {
                let count = allTags.filter(t => t.cats.includes(cat)).length;
                let dur = allTags.filter(t => t.cats.includes(cat)).reduce((sum, t) => sum + (t.end - t.start), 0);
                return `<div><b>${cat}:</b> <span style="color:#555;">${count} | ${dur.toFixed(1)}s</span></div>`;
            }).join('');
            drawPieChart();
        }

        // ----- EDIT MODAL LOGIC -----
        function openEditModal(index) {
            editingIndex = index;
            let tag = allTags[index];
            editSelectedCats = [...tag.cats];
            document.getElementById('edit-start').value = formatTime(tag.start);
            document.getElementById('edit-end').value = formatTime(tag.end);

            document.getElementById('edit-cat-buttons').innerHTML = CAT_ORDER.map(cat => 
                `<button class="tag-btn btn-${cat} ${editSelectedCats.includes(cat) ? 'active' : ''}" onclick="toggleEditCat('${cat}')">${cat}</button>`
            ).join('');

            renderEditPrompts(tag.prompts);
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function toggleEditCat(cat) {
            if (editSelectedCats.includes(cat)) { editSelectedCats = editSelectedCats.filter(c => c !== cat); } 
            else { editSelectedCats.push(cat); }
            
            document.getElementById('edit-cat-buttons').innerHTML = CAT_ORDER.map(c => 
                `<button class="tag-btn btn-${c} ${editSelectedCats.includes(c) ? 'active' : ''}" onclick="toggleEditCat('${c}')">${c}</button>`
            ).join('');

            renderEditPrompts(extractPrompts('edit-prompt-area')); // preserve current state
        }

        function renderEditPrompts(existingPrompts) {
            const area = document.getElementById('edit-prompt-area');
            if (editSelectedCats.length === 0) {
                area.innerHTML = '<div style="color: #999; font-size: 12px; font-style: italic;">Select a category to view prompts.</div>';
                return;
            }
            let orderedCats = CAT_ORDER.filter(c => editSelectedCats.includes(c));
            area.innerHTML = `<div class="cards-container">${orderedCats.map(cat => generateCardHTML(cat, existingPrompts)).join('')}</div>`;
        }

        function seekFromEdit() { video.currentTime = parseTime(document.getElementById('edit-start').value); }
        function saveEdit() {
            let tag = allTags[editingIndex];
            tag.start = parseTime(document.getElementById('edit-start').value);
            tag.end = parseTime(document.getElementById('edit-end').value);
            tag.cats = [...editSelectedCats];
            tag.prompts = extractPrompts('edit-prompt-area');
            allTags.sort((a, b) => a.start - b.start);
            closeModal(); updateUI();
        }

        function deleteTag() { allTags.splice(editingIndex, 1); closeModal(); updateUI(); }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; editingIndex = null; }

        // ----- EXPORT -----
        async function exportCSV() {
            if (allTags.length === 0) { alert("No tags to save!"); return; }
            let csv = "Start_ms,End_ms,Categories,Responses\n" + allTags.map(t => `${Math.floor(t.start*1000)},${Math.floor(t.end*1000)},${t.cats.join('|')},"${JSON.stringify(t.prompts || {}).replace(/"/g, '""')}"`).join('\n');
            let defaultFilename = `${currentVideoName}_data.csv`;
            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({ suggestedName: defaultFilename, types: [{ description: 'CSV File', accept: {'text/csv': ['.csv']} }] });
                    const writable = await handle.createWritable();
                    await writable.write(csv); await writable.close(); return; 
                } catch (err) { if (err.name !== 'AbortError') fallbackDownload(csv, defaultFilename); }
            } else { fallbackDownload(csv, defaultFilename); }
        }

        function fallbackDownload(csvContent, filename) {
            let a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv' }));
            a.download = filename; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        window.onkeydown = (e) => { if (e.code === "Space" && e.target.tagName !== "INPUT") { e.preventDefault(); togglePlay(); } };
        drawPieChart();
    </script>
</body>
</html>
